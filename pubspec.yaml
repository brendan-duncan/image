  meta: ^1.3.0
  xml: ^6.0.1

dev_dependencies:
  build_runner: ^2.1.5
  build_test: ^2.1.4
  ffigen: ^20.1.1
  http: ^1.1.0
  intl: ^0.20.2
  lints: ^5.1.1
  test: ^1.16.0
  web: ^1.1.0
